name: Nightly Wagtail Test

on:
  schedule:
    - cron: '0 1 * * *'
    # At 01:00, daily
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nightly-wagtail-test:
    runs-on: ubuntu-latest
    env:
      WEBHOOK_EXISTS: ${{ secrets.SLACK_WEBHOOK_URL != '' }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: '3.11'
      - run: uv sync --dev
      - run: uv add git+https://github.com/wagtail/wagtail --branch main
      - run: uv run pytest -vv
      - run: ./.github/scripts/report_nightly_build_failure.py
        if: ${{ failure() && env.WEBHOOK_EXISTS == 'true' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
